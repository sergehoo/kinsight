# ============================================================================
# k-insight — déploiement PRODUCTION via Dokploy (Compose + Traefik).
#
# À utiliser comme « Compose Path » dans Dokploy : ./docker-compose.dokploy.yml
# - Ingress géré par Traefik (réseau externe `dokploy-network`) ; seul le frontend
#   est exposé, il proxifie /api et /admin vers le backend (réseau interne).
# - Pas de ports publiés, pas de `container_name`/`name:` figés : Dokploy gère le
#   nommage du projet et l'orchestration.
# - Renseigner les variables (DOMAIN, secrets…) dans l'onglet Environment de Dokploy
#   — voir .env.dokploy.example et infra/dokploy/README.md.
# ============================================================================

x-backend-env: &backend-env
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY is required}
  DJANGO_DEBUG: "0"
  DJANGO_ALLOWED_HOSTS: ${DOMAIN:?DOMAIN is required},localhost,127.0.0.1
  CSRF_TRUSTED_ORIGINS: https://${DOMAIN:?DOMAIN is required}
  SECURE_SSL_PROXY: "1"
  DJANGO_SECURE_COOKIES: "1"
  APP_DB_HOST: postgres
  APP_DB_PORT: "5432"
  APP_DB_NAME: ${APP_DB_NAME:-k_insight_app}
  APP_DB_USER: ${APP_DB_USER:-k_insight_app}
  APP_DB_PASSWORD: ${APP_DB_PASSWORD:?APP_DB_PASSWORD is required}
  EDW_DB_HOST: postgres
  EDW_DB_PORT: "5432"
  EDW_DB_NAME: ${EDW_DB_NAME:-k_insight_edw}
  EDW_DB_USER: ${EDW_DB_USER:-k_insight_app}
  EDW_DB_PASSWORD: ${EDW_DB_PASSWORD:?EDW_DB_PASSWORD is required}
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1

networks:
  dokploy-network:
    external: true
  kinsight:
    driver: bridge

volumes:
  kinsight-postgres-data:
  kinsight-redis-data:
  kinsight-minio-data:
  kinsight-django-static:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      APP_DB_NAME: ${APP_DB_NAME:-k_insight_app}
      APP_DB_USER: ${APP_DB_USER:-k_insight_app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:?APP_DB_PASSWORD is required}
      EDW_DB_NAME: ${EDW_DB_NAME:-k_insight_edw}
      EDW_DB_USER: ${EDW_DB_USER:-k_insight_app}
      EDW_DB_PASSWORD: ${EDW_DB_PASSWORD:?EDW_DB_PASSWORD is required}
      DBT_DB_USER: ${DBT_DB_USER:-k_insight_dbt}
      DBT_DB_PASSWORD: ${DBT_DB_PASSWORD:?DBT_DB_PASSWORD is required}
      AIRBYTE_DB_USER: ${AIRBYTE_DB_USER:-k_insight_airbyte}
      AIRBYTE_DB_PASSWORD: ${AIRBYTE_DB_PASSWORD:-change-me}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
    volumes:
      - kinsight-postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:ro
    networks:
      kinsight:
        aliases: [postgres]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - kinsight-redis-data:/data
    networks:
      kinsight:
        aliases: [redis]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    volumes:
      - kinsight-minio-data:/data
    networks:
      kinsight:
        aliases: [minio]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 8

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
      CORS_ALLOWED_ORIGINS: https://${DOMAIN:?DOMAIN is required}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_MODEL_SYNTHESIS: ${AI_MODEL_SYNTHESIS:-claude-opus-4-8}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-k-insight-exports}
    command: >
      sh -c "python manage.py migrate --noinput
      && python manage.py collectstatic --noinput
      && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-3} --timeout 60"
    volumes:
      - kinsight-django-static:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      kinsight:
        aliases: [backend]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz/', timeout=3).read()\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 8

  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
    command: ["celery", "-A", "config.celery", "worker", "--loglevel=INFO"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kinsight

  celery-beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
    command: ["celery", "-A", "config.celery", "beat", "--loglevel=INFO"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kinsight

  frontend:
    build:
      context: .
      dockerfile: frontend/web/Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_USE_MOCK: "false"
        VITE_API_TOKEN: ${VITE_API_TOKEN:-}
    restart: unless-stopped
    volumes:
      - kinsight-django-static:/var/www/django-static:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - kinsight
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 8
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # HTTP -> HTTPS
      - "traefik.http.routers.kinsight-web.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.kinsight-web.entrypoints=web"
      - "traefik.http.routers.kinsight-web.middlewares=kinsight-https-redirect"
      - "traefik.http.middlewares.kinsight-https-redirect.redirectscheme.scheme=https"
      # HTTPS (TLS Let's Encrypt via le certresolver de Dokploy)
      - "traefik.http.routers.kinsight-secure.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.kinsight-secure.entrypoints=websecure"
      - "traefik.http.routers.kinsight-secure.tls=true"
      - "traefik.http.routers.kinsight-secure.tls.certresolver=${ACME_RESOLVER:-letsencrypt}"
      - "traefik.http.services.kinsight-frontend.loadbalancer.server.port=8080"

  # Transformations dbt (opt-in) : exécuter via Dokploy "Run" ou
  # `docker compose -f docker-compose.dokploy.yml --profile dbt run --rm dbt build`.
  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.8.latest
    profiles: ["dbt"]
    working_dir: /usr/app
    environment:
      DBT_HOST: postgres
      DBT_PORT: "5432"
      DBT_DB: ${EDW_DB_NAME:-k_insight_edw}
      DBT_USER: ${DBT_DB_USER:-k_insight_dbt}
      DBT_PASSWORD: ${DBT_DB_PASSWORD:?DBT_DB_PASSWORD is required}
      DBT_SCHEMA: ${DBT_SCHEMA:-warehouse}
    volumes:
      - ./warehouse/dbt:/usr/app
      - ./infra/dbt:/root/.dbt:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kinsight
    entrypoint: ["dbt"]
    command: ["build"]
