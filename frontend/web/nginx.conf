# Conserve le schéma d'origine derrière un reverse proxy TLS (Traefik/Dokploy) :
# on réutilise X-Forwarded-Proto entrant s'il existe, sinon on retombe sur $scheme (dev direct).
map $http_x_forwarded_proto $kinsight_forwarded_proto {
  default $http_x_forwarded_proto;
  ""      $scheme;
}

server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript image/svg+xml;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location /api/ {
    proxy_pass http://backend:8000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $kinsight_forwarded_proto;
  }

  location /admin/ {
    proxy_pass http://backend:8000/admin/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $kinsight_forwarded_proto;
  }

  location /static/ {
    alias /var/www/django-static/;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  location /assets/ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
